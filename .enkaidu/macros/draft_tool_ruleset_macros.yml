draft_tool_ruleset.enter:
  description: Get ready to draft tool risk rulesets by reading skill and supporting documentation.
  queries:
    - /session push
    - |
      Read `./skills/draft-tool-ruleset/SKILL.md` to understand what we are going to do.
      Read the files referenced by the skill.
      Let me know when you're ready to start generating rulesets.

draft_tool_ruleset.generate_for:
  description: |
    Generate a tool risk ruleset JSON file for a tool / platform specified via parameters.
    - Usage: `!draft_tool_ruleset.generate_for tool=TOOLNAME platform=OSNAME`
    - Use one of the following platform names: `macos`, `linux`, `windows`, or `posix`
    - Does not support notes; use `!draft_tool_ruleset.generate` if notes needed.
  queries:
    - /session push
    - /include response_json_schema ./skills/draft-tool-ruleset/resources/request_tool_risk_ruleset_schema.json
    - |
      Analyze the following shell tool and generate a risk ruleset.

      Tool: %{tool}
      Platform: %{platform}

      Respond with a JSON object conforming to the provided schema.
      Additional guidance
      - Severity WARNING requires a concrete, direct threat vector beyond "more information is revealed." Flags that change output format or verbosity without materially expanding access scope should be INFO unless combined with a flag that does.
      - Must use SemGrep style patterns. Do not use regex or any other format.
    - |
      Save the ruleset in `%{tool}.json` in the ./rulesets folder under the platform sub-folder.
    - /prompt use draft_tool_ruleset.continue_to_generate
    - /session usage
    - /session pop

draft_tool_ruleset.generate:
  description: |
    Generate a tool risk ruleset JSON file for a tool and platform you will be prompted for.
    - Usage: `!draft_tool_ruleset.generate`
  queries:
    - /session push
    - /include response_json_schema ./skills/draft-tool-ruleset/resources/request_tool_risk_ruleset_schema.json
    - /prompt use draft_tool_ruleset.generate
    - /prompt use draft_tool_ruleset.continue_to_generate
    - /session usage
    - /session pop

draft_tool_ruleset.review:
  description: |
    Review an existing tool risk ruleset JSON file for a tool and platform you will be prompted for.
    - Usage: `!draft_tool_ruleset.review`
  queries:
    - /session push
    - /include response_json_schema ./skills/draft-tool-ruleset/resources/request_tool_risk_ruleset_schema.json
    - /prompt use draft_tool_ruleset.review
    - /prompt use draft_tool_ruleset.continue_to_review
    - /session usage
    - /session pop
